<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistCode</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Welcome to DistCode</h1>
    
        <select name="states" id="state">
            <option value="--">--</option>
            <option value="ASSAM">ASSAM</option>
            <option value="MANIPUR">MANIPUR</option>
            <option value="MEGHALAYA">MEGHALAYA</option>
            <option value="MIZORAM">MIZORAM</option>
            <option value="NAGALAND">NAGALAND</option>
            <option value="SIKKIM">SIKKIM</option>
            <option value="TRIPURA">TRIPURA</option>
        </select>
    
        <p id="message">Please select a state</p>

        <section name="all-distcodes" id="all-distcodes">
            <div id="district-list-div" class="list-div">
                <h3>Districts</h3>
                <ul id="district-list" class="list"></ul>
            </div>
            <div id="pincode-list-div" class="list-div"> 
                <h3>Pincodes</h3>
                <ul id="pincode-list" class="list"></ul>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
